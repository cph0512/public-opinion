# 每日輿情收集(GitHub Actions 排程)
#
# 注意:GitHub 只會讀取「repo 根目錄」的 .github/workflows/。
# 這個檔案是為「獨立的 public-opinion repo」設計的 —— 把本資料夾搬成獨立 repo 後即會生效
#(見 README 的「搬到獨立 repo」章節)。在 form-builder 子資料夾裡時不會被觸發。
#
# 需要的 Secrets(Settings → Secrets and variables → Actions):
#   ANTHROPIC_API_KEY / REDDIT_CLIENT_ID / REDDIT_CLIENT_SECRET
#   THREADS_ACCESS_TOKEN / FACEBOOK_ACCESS_TOKEN
#   SMTP_HOST / SMTP_PORT / SMTP_USER / SMTP_PASSWORD / EMAIL_FROM / EMAIL_TO

name: daily-public-opinion

on:
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 00:00(台灣早上 8 點)
  workflow_dispatch: {} # 允許手動觸發測試

permissions:
  contents: write # 需要寫入權限才能把報告與去重狀態 commit 回 repo

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install anthropic  # AI 摘要用(沒有金鑰會自動略過)

      - name: Prepare config
        run: |
          # 沒有 config.yaml 時,用 config.example.yaml 當基礎。
          # 若要在 CI 追蹤特定關鍵字,請直接編輯 config.example.yaml(它有被版控)。
          if [ ! -f config.yaml ]; then cp config.example.yaml config.yaml; fi

      - name: Run collector
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python -m public_opinion run --config config.yaml

      - name: Commit reports & dedup state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports state 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "沒有新內容,略過 commit。"
          else
            git commit -m "chore: 每日輿情報告 $(date -u +%Y-%m-%d)"
            git push
          fi
