<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>輿情搜尋 · public-opinion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
        .htmx-request .htmx-indicator { opacity: 1; }
        .htmx-request.htmx-indicator { opacity: 1; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

<header class="bg-white border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center gap-3">
        <span class="text-2xl">🗞️</span>
        <h1 class="text-xl font-bold">輿情搜尋</h1>
        <span class="hidden sm:inline text-sm text-slate-500 ml-2">Reddit · Dcard · Threads · Facebook</span>
        <span class="ml-auto text-xs text-slate-400">public-opinion</span>
    </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-8">

    <form hx-get="/search"
          hx-target="#results"
          hx-indicator="#loading"
          hx-swap="innerHTML"
          class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">

            <div class="md:col-span-3">
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    關鍵字 <span class="text-slate-400 text-xs">(可用逗號分隔多個)</span>
                </label>
                <input name="q" type="text" required autofocus
                       class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-base focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none"
                       placeholder="例:AI、Claude、電動車">
            </div>

            <div class="md:col-span-3">
                <label class="block text-sm font-medium text-slate-700 mb-2">平台</label>
                <div class="flex flex-wrap gap-4">
                    {% for key, label in platform_labels.items() %}
                    <label class="flex items-center gap-1.5 text-sm cursor-pointer select-none">
                        <input type="checkbox" name="platforms" value="{{ key }}"
                               {% if key in ['reddit', 'dcard'] %}checked{% endif %}
                               class="w-4 h-4 rounded text-orange-500 focus:ring-orange-500 border-slate-300">
                        {{ label }}
                    </label>
                    {% endfor %}
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">時間範圍(最近 N 小時)</label>
                <input name="hours" type="number" value="24" min="1" max="168"
                       class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">最低分數 / 讚數</label>
                <input name="min_score" type="number" value="0" min="0"
                       class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none">
            </div>

            <div class="flex items-end">
                {% if has_anthropic %}
                <label class="flex items-center gap-2 text-sm cursor-pointer select-none">
                    <input type="checkbox" name="summary" value="true"
                           class="w-4 h-4 rounded text-orange-500 focus:ring-orange-500 border-slate-300">
                    <span>🧠 使用 Claude 產生 AI 摘要</span>
                </label>
                {% else %}
                <p class="text-xs text-slate-400">未設定 <code>ANTHROPIC_API_KEY</code>,AI 摘要停用。</p>
                {% endif %}
            </div>

        </div>

        <div class="mt-6 flex items-center gap-4">
            <button type="submit"
                    class="bg-orange-500 hover:bg-orange-600 active:bg-orange-700 text-white font-semibold px-6 py-2.5 rounded-lg transition shadow-sm">
                🔎 搜尋
            </button>
            <span id="loading" class="htmx-indicator text-sm text-slate-500 flex items-center gap-2">
                <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" opacity="0.25"></circle>
                    <path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="4" stroke-linecap="round"></path>
                </svg>
                正在抓取各平台貼文……
            </span>
        </div>

    </form>

    <div id="results">
        <div class="text-center text-slate-400 py-12 text-sm">
            👆 輸入關鍵字後按「搜尋」開始
        </div>
    </div>

</main>

<footer class="max-w-6xl mx-auto px-6 py-8 text-center text-xs text-slate-400">
    <p>資料來源:各平台公開 API · 僅供個人監測參考</p>
</footer>

</body>
</html>
